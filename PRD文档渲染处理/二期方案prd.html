<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计费引擎方案文档</title>
    <script src="./config/marked.min.js"></script>
    <script src="./config/mdConfig.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f9fafb;
            color: #18181b;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background-color: #ffffff;
            border-right: 1px solid #e4e4e7;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #e4e4e7;
            background-color: #fafafa;
        }

        .sidebar-header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #18181b;
        }

        .nav-tree {
            padding: 8px 0;
        }

        .nav-item {
            cursor: pointer;
            user-select: none;
        }

        .nav-item.level-1 {
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
            color: #3f3f46;
            border-bottom: 1px solid #f4f4f5;
        }

        .nav-item.level-2 {
            padding: 10px 16px 10px 32px;
            font-size: 13px;
            font-weight: 500;
            color: #52525b;
            border-bottom: 1px solid #f4f4f5;
        }

        .nav-item.level-3 {
            padding: 8px 16px 8px 48px;
            font-size: 13px;
            color: #71717a;
            border-bottom: 1px solid #f4f4f5;
        }

        .nav-item:hover {
            background-color: #f4f4f5;
        }

        .nav-item.active {
            background-color: #e4e4e7;
            color: #18181b;
            font-weight: 500;
        }

        .nav-item.level-1.active {
            font-weight: 600;
        }

        .nav-children {
            display: block;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 32px 48px;
            background-color: #ffffff;
        }

        .content-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .markdown-content {
            line-height: 1.8;
            color: #27272a;
        }

        .markdown-content h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 24px 0 16px 0;
            color: #18181b;
            padding-bottom: 8px;
            border-bottom: 2px solid #e4e4e7;
        }

        .markdown-content h2 {
            font-size: 22px;
            font-weight: 600;
            margin: 20px 0 12px 0;
            color: #27272a;
            padding-bottom: 6px;
            border-bottom: 1px solid #e4e4e7;
        }

        .markdown-content h3 {
            font-size: 18px;
            font-weight: 600;
            margin: 16px 0 10px 0;
            color: #3f3f46;
        }

        .markdown-content h4 {
            font-size: 16px;
            font-weight: 600;
            margin: 14px 0 8px 0;
            color: #52525b;
        }

        .markdown-content p {
            margin: 12px 0;
            color: #52525b;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin: 12px 0;
            padding-left: 24px;
        }

        .markdown-content li {
            margin: 6px 0;
            color: #52525b;
        }

        .markdown-content code {
            background-color: #f4f4f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            color: #dc2626;
        }

        .markdown-content pre {
            background-color: #27272a;
            color: #f4f4f5;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 16px 0;
        }

        .markdown-content pre code {
            background-color: transparent;
            color: #f4f4f5;
            padding: 0;
        }

        .markdown-content blockquote {
            border-left: 4px solid #e4e4e7;
            padding-left: 16px;
            margin: 16px 0;
            color: #71717a;
            font-style: italic;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
        }

        .markdown-content th,
        .markdown-content td {
            border: 1px solid #e4e4e7;
            padding: 10px 12px;
            text-align: left;
        }

        .markdown-content th {
            background-color: #f4f4f5;
            font-weight: 600;
            color: #18181b;
        }

        .markdown-content td {
            color: #52525b;
        }

        .markdown-content a {
            color: #2563eb;
            text-decoration: underline;
        }

        .markdown-content a:hover {
            color: #1d4ed8;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 400px;
            color: #71717a;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            color: #a1a1aa;
        }

        .empty-state p {
            font-size: 14px;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f4f4f5;
        }

        ::-webkit-scrollbar-thumb {
            background: #d4d4d8;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a1a1aa;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>计费引擎方案</h1>
            </div>
            <div class="nav-tree" id="navTree">
                <!-- 目录将通过JavaScript动态生成 -->
            </div>
        </div>
        <div class="content">
            <div class="content-container">
                <div id="contentArea" class="markdown-content">
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <p>请选择左侧目录查看文档内容</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 统一的导航数据配置
       
        let activeItemId = null;

        // 渲染导航树（直接使用 phaseNavs 数组）
        function renderNavTree(data, container) {
            data.forEach(item => {
                const navItem = document.createElement('div');
                navItem.className = 'nav-item level-' + item.level;
                navItem.dataset.id = item.id;
                navItem.textContent = item.label;

                navItem.addEventListener('click', () => {
                    handleNavItemClick(item);
                });

                container.appendChild(navItem);

                if (item.children && item.children.length > 0) {
                    const childContainer = document.createElement('div');
                    childContainer.className = 'nav-children';
                    renderNavTree(item.children, childContainer);
                    container.appendChild(childContainer);
                }
            });
        }

        function handleNavItemClick(item) {
            if (item.level === 1 || item.level === 2) {
                return;
            }

            setActiveItem(item.id);
            loadContent(item.id);
        }

        function setActiveItem(id) {
            const allItems = document.querySelectorAll('.nav-item');
            allItems.forEach(item => {
                item.classList.remove('active');
            });

            const activeItem = document.querySelector('[data-id="' + id + '"]');
            if (activeItem) {
                activeItem.classList.add('active');
            }

            activeItemId = id;
        }

        function loadContent(id) {
            const contentArea = document.getElementById('contentArea');

            // 先显示加载状态
            contentArea.innerHTML = `
        <div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            <p>加载中...</p>
        </div>
    `;

            // 动态加载 Markdown 文件
            fetch(`docs/${id}.md`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.text();
                })
                .then(content => {
                    if (content && content.trim()) {
                        contentArea.innerHTML = marked.parse(content);
                    } else {
                        contentArea.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <p>文档内容为空</p>
                    </div>
                `;
                    }
                })
                .catch(error => {
                    console.error('Error loading document:', error);
                    contentArea.innerHTML = `
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <p>文档加载失败</p>
                </div>
            `;
                });
        }

        function init() {
            const navTree = document.getElementById('navTree');
            renderNavTree(phaseNavs, navTree);  // 直接使用 phaseNavs 数组
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
