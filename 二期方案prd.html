## 一、背景

随着计费引擎的发展，因子作为计费规则的核心组成部分，需要更加标准化和集中化管理。为了支持多业务系统的复杂计费需求，确保因子与业务单据的正确绑定，提高因子配置的效率和准确性，特制定本因子配置规则方案。

## 二、术语定义

| 术语 | 定义 |
|------|------|
| 因子 | 计费引擎中用于计算费用的基础元素，包括用于区间判断、费用计算、条件判断等的各类元素 |
| 所属单据 | 因子关联的业务单据类型，如TruckOrder、Waybill等 |
| 因子编码 | 从所属单据内选择的字段编码，是因子在所属单据内的唯一标识，用于计费规则中引用 |
| 业务字段 | 因子绑定的业务系统字段，根据因子编码自动关联 |
| 数据类型 | 因子的值类型，如数值、字符串、数组 |

#### 3.1.1 唯一性判断

**引擎中的唯一性定义**：
- 因子在引擎中的唯一标识 = \`所属单据编码\` + \`因子编码\`
- 示例：\`TruckOrder_WEIGHT\` 表示 TruckOrder 单据下的 WEIGHT 因子

**唯一性规则**：
- 同一所属单据内的因子编码必须唯一
- 不同所属单据的因子编码可以重复

**校验时机**：
- 新增因子时：检查因子编码在所选所属单据内是否已存在
- 编辑因子时：检查因子编码是否与同一所属单据内的其他因子重复

**校验逻辑**：
1. 系统根据所属单据和因子编码查询数据库
2. 如果存在相同所属单据和因子编码的记录，则提示"因子编码在该单据内已存在"
3. 校验通过后，允许保存或导入

**错误提示**：因子编码在所属单据内已存在，请修改因子编码或选择其他所属单据

## 四、与其他模块的关系

### 4.1 与业务单据的关系

- 因子配置前需先注册业务单据类型
- 因子绑定到具体业务单据的字段
- 不同单据的因子编码可重复，同一单据内必须唯一

### 4.2 与计费规则的关系

- **因子引用**：计费规则中使用因子进行费用计算
- **因子状态影响**：禁用的因子不能被新的计费规则引用
- **因子变更影响**：因子变更时，系统需要检查并提示对现有计费规则的影响
- **因子值验证**：
  - **阶梯计费**：区间因子必须是数值类型（整数或小数）
  - **比例型计费**：计算因子必须是数值类型，用于与比例计算最终费用
    - 计算因子可以是业务单据的字段值，也可以是模型中配置的费用项
  - **条件型计费**：条件因子根据操作符的数据类型要求：
    - \`$Equal$\`（等于） / \`$NotEqual$\`（不等于） / \`$In$\`（包含于） / \`$NotIn$\`（不包含于）：支持数值、字符串、数组类型
    - \`$GreaterThan$\`（大于） / \`$LessThan$\`（小于） / \`$GreaterOrEqual$\`（大于等于） / \`$LessOrEqual$\`（小于等于）：仅支持数值类型
    - \`$StartsWith$\`（开头是） / \`$EndsWith$\`（结尾是）：仅支持字符串类型
    - \`$AnyContain$\`（任一包含） / \`$AllContain$\`（全部包含）：仅支持数组类型
- **费用项引用**：计费规则中可以直接引用同一模型内已配置的其他费用项的费用金额作为计算因子
  - 引用范围：仅限当前计费模型中已配置的费用项
  - 引用格式：费用项编码（如 FEE_SHIPPING）
  - 依赖处理：被引用的费用项必须先于当前费用项计算完成
  - 循环引用检测：系统需检测并防止循环引用（如A依赖B，B依赖A）

### 4.3 与维度配置的关系

- **维度与因子的区别**：
  - 维度：用于业务筛选和分组，侧重业务分类
  - 因子：用于费用计算，侧重数值处理
- **数据来源**：两者都可以绑定到业务单据的字段
- **协同使用**：维度用于确定计费场景，因子用于计算具体费用

## 五、边界情况处理

1. **因子重名处理**：通过所属单据隔离，允许不同单据使用相同的因子编码
2. **因子删除保护**：被引用的因子不允许删除，避免影响现有计费规则
3. **数据类型变更**：数据类型一旦设置，不允许修改，避免类型不兼容问题
4. **业务单据变更**：业务单据禁用时，相关因子自动禁用
5. **字段编码变更**：业务单据字段编码变更时，系统需要提示对相关因子的影响`,

## 四、业务规则

### 4.1 基本信息规则

1. **主模型唯一性**：在"一级业务+二级业务+三级业务+关联单据"维度组合下，主模型唯一存在
2. **子模型多配置**：在同一业务维度组合下，子模型可配置多个
3. **主子模型关系**：主子模型间的运算关系需在独立配置页面中定义，当前默认通用运算规则为"相加"
4. **状态管理**：
   - 报价接收状态：控制模型是否接收新的报价录入和修改
   - 计费参与状态：控制模型下的报价是否参与计费计算
5. **报价管理**：对报价不能做物理删除和覆盖，统一按逻辑删除来处理

### 4.2 维度配置规则

1. **维度来源限制**：仅可选择已配置的维度
2. **业务维度限制**：只能选择在"一级业务+二级业务+三级业务+关联单据"下的维度
3. **多选限制**：至少选择一个维度

### 4.3 费用项配置规则

1. **费用项来源限制**：只能选择在"一级业务+二级业务+三级业务+关联单据"下的费用项
2. **多选限制**：至少选择一个费用项

### 4.4 相关匹配逻辑规则

#### 4.4.1 录入报价时必填项的校验逻辑规则

1. **维度来源限制**：仅可选择"维度配置"中已关联到当前模型的维度
2. **多选限制**：每条校验逻辑至少选择1个维度
3. **序号唯一性**：序号自动生成且唯一，不可手动修改
4. **优先级规则**：序号越小优先级越高，校验时按序号从小到大依次执行
5. **删除限制**：至少保留1条校验逻辑

#### 4.4.2 业务单据匹配报价兜底逻辑规则

1. **维度来源限制**：仅可选择"维度配置"中已关联到当前模型的维度
2. **多选限制**：每条匹配逻辑至少选择1个维度
3. **序号唯一性**：序号自动生成且唯一，不可手动修改
4. **优先级规则**：序号越小优先级越高，匹配时按序号从小到大依次执行
5. **删除限制**：至少保留1条匹配逻辑
6. **匹配逻辑设计原则**：优先设计精确匹配条件（多维度组合），再设计模糊匹配条件（少维度组合），形成从精确到模糊的兜底策略

## 五、流程说明

### 5.1 校验流程

\`\`\`mermaid
flowchart TD
    A[开始录入报价] --> B[获取所有校验逻辑]
    B --> C{是否有校验逻辑?}
    C -->|否| D[跳过校验]
    C -->|是| E[按序号排序]
    E --> F[取优先级1的校验逻辑]
    F --> G[检查该逻辑中的所有维度是否已填写]
    G --> H{所有维度都已填写?}
    H -->|是| I[校验通过,停止后续校验]
    H -->|否| J{是否还有下一优先级?}
    J -->|是| K[取下一优先级的校验逻辑]
    K --> G
    J -->|否| L[所有优先级均未通过]
    L --> M[报错提示:必填项未填写完整]
    I --> N[继续报价录入流程]
    D --> N

    C -->|是| E[按序号排序]
    E --> F[取优先级1的匹配逻辑]
    F --> G[按匹配逻辑中的维度筛选报价]
    G --> H{是否有报价匹配?}

    D --> N

## 六、与其他模块的关系

### 6.1 与业务单据的关系

- 模型配置前需先注册业务单据类型
- 模型绑定到具体业务单据
- 不同单据的模型可以重名，同一单据内的主模型必须唯一

### 6.2 与维度的关系

- 模型引用已配置的维度
- 维度用于业务筛选和分组
- 模型维度变更时，系统需要检查并提示对现有报价的影响

### 6.3 与费用项的关系

- 模型引用已配置的费用项
- 费用项是计费规则的具体计算对象
- 模型费用项变更时，系统需要检查并提示对现有计费规则的影响

### 6.4 与因子的关系

- 因子作为计费规则的基础元素，被费用项引用
- 模型通过费用项间接使用因子进行费用计算
- 因子变更时，系统需要检查并提示对相关费用项和模型的影响

## 七、边界情况处理

1. **模型重名处理**：通过业务维度组合隔离，允许不同业务维度组合使用相同的模型名称
2. **模型删除保护**：被引用的模型不允许删除，避免影响现有计费规则
3. **维度变更**：
   - 允许新增维度：现有模型可以添加新的维度，以适应业务发展需求
   - 禁止删除维度：已关联的维度不能删除，避免影响现有报价的完整性
   - 维度变更影响：添加新维度时，系统应提示用户新维度对现有报价的影响（如需要补充填写新维度的值）
4. **费用项变更**：
   - 允许新增费用项：现有模型可以添加新的费用项，以适应业务发展需求
   - 禁止删除费用项：已关联的费用项不能删除，避免影响现有计费规则的完整性
   - 费用项变更影响：添加新费用项时，系统应提示用户新费用项对现有计费规则的影响
5. **关联单据变更**：关联单据禁用时，相关模型自动禁用`,

## 计费要素

计费引擎的计费规则以三类核心要素为基础，结合价格信息、计算规则等其他配置，共同构成完整的费用计算体系：

### 1. 因子（Factor）
- **定义**：计费计算的基础数据来源，绑定到业务单据的具体字段
- **类型**：数值、字符串、数组
- **用途**：
  - 区间判断（如重量、体积用于阶梯计费）
  - 费用计算（如重量、件数作为计费基础）
  - 条件判断（如目的国、商品类型用于条件计费）
- **引用方式**：通过因子编码引用，因子编码在所属单据内唯一

### 2. 通用计费要素
- **定义**：用于费用计算和条件判断的操作符集合
- **类型**：
  - 基础操作要素：NONE（无操作）
  - 算术运算符：ADD, SUB, MUL, DIV
  - 逻辑运算符：AND, OR, NOT
  - 操作符：$Equal$, $NotEqual$, $GreaterThan$, $LessThan$, $GreaterOrEqual$, $LessOrEqual$, $AnyContain$, $AllContain$
- **用途**：
  - 基础操作：直接使用原始值，适用于单因子场景、跳过区间判断、跳过条件检查等
  - 复杂数学计算（如体积计算、费用汇总）
  - 多条件组合判断（如目的国+重量+商品类型）
  - 数组元素判断（如商品名称包含特定关键词）

### 3. 费用项（Fee Item）
- **定义**：计费规则中的具体费用项目
- **引用能力**：可以引用同一模型内的其他费用项
- **用途**：
  - 费用汇总（如总运费=基础运费+燃油附加费）
  - 比例计算（如管理费=总运费×10%）
  - 多级费用结构（如基础费用+附加费用）

### 要素使用原则
- 所有因子必须在计费引擎中已维护，通过因子编码引用
- 通用计费要素用于构建复杂的计算逻辑和条件判断
- 费用项用于构建多级费用结构和相互依赖的费用计算
- 三类要素相互配合，构成灵活而强大的计费规则体系


## 计费规则

### 阶梯计费 - 分段计费

计费规则：阶梯计费-分段计费
规则明细：
\`\`\`json
{
  区间因子：[区间因子],
  区间：(开始值, 结束值],
  计费因子：[计费因子],
  区间价格：[金额],
  最小值：[最小值],
  最大值：[最大值]
}
{
  区间因子：[区间因子],
  区间：(开始值, 结束值],
  计费因子：[计费因子],
  区间价格：[金额],
  最小值：[最小值],
  最大值：[最大值]
}
\`\`\`

**校验规则**：
- 区间因子和计费因子必须是计费引擎中已维护的因子编码。
- 同一个费用项下，区间因子必须是相同的。
- 且区间必须是衔接的，区间按左开右闭方式定义，例如（0, 10]、(10, 20]、(20, 30] 等。
- 区间价格、最小值、最大值必须是数值类型，保留 6 位小数。
- 最大值的金额必须大于最小值的金额

**计算逻辑**：
- 根据「区间因子值」在规则明细中找到匹配的区间
- 取匹配区间的「计费因子值」×「区间价格」
- 上下限处理
    - 若有最小值：计算结果与最小值比较，取较大值
    - 若有最大值：计算结果与最大值比较，取较小值
    - 若同时有最小值和最大值：先与最小值比较，再与最大值比较

**示例**：包裹数量阶梯计费（核重计费）

\`\`\`json
[
  {
    "区间因子": "PackageCount",
    "区间": "(0, 600]",
    "计费因子": "CalculatedWeight",
    "区间价格": "0",
    "最小值": "250",
    "最大值": "10000"
  },
  {
    "区间因子": "PackageCount",
    "区间": "(600, 1500]",
    "计费因子": "CalculatedWeight",
    "区间价格": "0.65",
    "最小值": "0",
    "最大值": "10000"
  },
  {
    "区间因子": "PackageCount",
    "区间": "(1500, 100000]",
    "计费因子": "CalculatedWeight",
    "区间价格": "0.6",
    "最小值": "0",
    "最大值": "10000"
  }
]
\`\`\`

**示例说明**：
- 区间因子：PackageCount（包裹数量）
- 计费因子：CalculatedWeight（核重）
- 价格规则：
  - 包裹数量 ≤ 600：低消250元
  - 包裹数量 600 ＜ x ≤ 1500：0.65元/kg
  - 包裹数量 > 1500：0.6元/kg

**示例计算**：
- 包裹数量500，核重100kg：
  - 计算费用：100kg × 0元/kg = 0元
  - 应用最小值：取250元
  - 最终费用：250元

- 包裹数量1000，核重200kg：
  - 计算费用：200kg × 0.65元/kg = 130元
  - 应用上下限：130元在0-10000之间
  - 最终费用：130元

- 包裹数量2000，核重300kg：
  - 计算费用：300kg × 0.6元/kg = 180元
  - 应用上下限：180元在0-10000之间
  - 最终费用：180元


### 阶梯计费 - 累进计费

计费规则：阶梯计费-累进计费
规则明细：
\`\`\`json
{
  区间因子：[区间因子],
  区间：[开始值, 结束值),
  区间价格：[金额],
  最小值：[最小值],
  最大值：[最大值]
}
{
  区间因子：[区间因子],
  区间：[开始值, 结束值),
  区间价格：[金额],
  最小值：[最小值],
  最大值：[最大值]
}
\`\`\`

**校验规则**：
- 区间因子必须是计费引擎中已维护的因子编码，且必须是数值类型。
- 同一个费用项下，区间因子必须是相同的。
- 区间必须是衔接的，区间按左闭右开方式定义，例如：[0, 10)、[10, 20)、[20, 30) 等。
- 区间价格、最小值、最大值必须是数值类型，保留 6 位小数。
- 最大值的金额必须大于最小值的金额

**计算逻辑**：
- 遍历所有区间，从第一个区间开始计算
- 对于每个区间：
  - 计算该区间的计费数量 = min(当前重量, 区间结束值) - max(0, 区间开始值)
  - 该区间费用 = 计费数量 × 区间价格
- 累加所有区间的费用得到最终结果
- 上下限处理
  - 若有最小值：计算结果与最小值比较，取较大值
  - 若有最大值：计算结果与最大值比较，取较小值
  - 若同时有最小值和最大值：先与最小值比较，再与最大值比较

**示例**：重量累进计费（含上下限）

\`\`\`json
[
  {
    "区间因子": "Weight",
    "区间": "[0, 10)",
    "区间价格": "10",
    "最小值": "50",
    "最大值": "200"
  },
  {
    "区间因子": "Weight",
    "区间": "[10, 50)",
    "区间价格": "8",
    "最小值": "80",
    "最大值": "500"
  },
  {
    "区间因子": "Weight",
    "区间": "[50, 10000)",
    "区间价格": "6",
    "最小值": "200",
    "最大值": "800"
  }
]
\`\`\`

**示例说明**：
- 区间因子：Weight（重量）
- 价格规则（累进计费）：
  - 0 ≤ Weight < 10kg：10元/kg，最低50元，最高200元
  - 10 ≤ Weight < 50kg：8元/kg，最低80元，最高500元
  - 50 ≤ Weight < 10000kg：6元/kg，最低200元，最高800元

**示例计算**：
- 重量为2kg（触发最小值）：
  - 0-2kg区间：2kg × 10元/kg = 20元
  - 应用最小值：取50元
  - 最终费用：50元

- 重量为15kg（正常情况）：
  - 0-10kg区间：10kg × 10元/kg = 100元
  - 10-15kg区间：5kg × 8元/kg = 40元
  - 计算总费用：100 + 40 = 140元
  - 应用上下限：140元在80-500之间
  - 最终费用：140元

- 重量为60kg（正常情况）：
  - 0-10kg区间：10kg × 10元/kg = 100元
  - 10-50kg区间：40kg × 8元/kg = 320元
  - 50-60kg区间：10kg × 6元/kg = 60元
  - 计算总费用：100 + 320 + 60 = 480元
  - 应用上下限：480元在200-800之间
  - 最终费用：480元


### 按比例计费

计费规则：比例型计费
规则明细：
\`\`\`json
{
  "比例": "[比例]",
  "计算因子": {
    "运算符": "[运算符]",
    "操作数": [ 
      {
        "运算符": "[运算符]",
        "操作数": ["[操作数因子]", "[操作数因子]"]
      },
      {
        "运算符": "[运算符]",
        "操作数": ["[操作数因子]", "[操作数因子]"]
      }
    ]
  },
  "最小值": "[最小值]",
  "最大值": "[最大值]"
}
\`\`\`

**说明**：
- 操作数可以是因子编码（如 "Weight"）或嵌套的计算因子结构
- 通过嵌套计算因子，可以支持复杂的运算表达式，如 (a + b) - (c - d)
- 运算符支持 NONE（无运算）、ADD（加）、SUB（减）、MUL（乘）、DIV（除）

**校验规则**：
- 比例验证：比例必须是百分比样式，如12%、5%等，比例数值必须在0-100%之间，数字精度建议6位数
- 计算因子验证：运算符必须是系统支持的运算符（ADD、SUB、MUL、DIV、NONE），操作数必须是计费引擎中已维护的因子编码或常量数值，操作数可以是一个或多个
- 上下限验证：最小值和最大值必须是数值类型，保留 6 位小数，最大值必须大于最小值

**计算逻辑**：
1. 计算计费因子值：如果计算因子包含运算符，按运算符对操作数进行运算；如果计算因子只包含单个因子编码，直接获取该因子的值
2. 计算费用：公式=计费因子计算结果×比例
3. 上下限处理：若有最小值，计算结果与最小值比较，取较大值；若有最大值，计算结果与最大值比较，取较小值；若同时有最小值和最大值，先与最小值比较，再与最大值比较

**示例**：复杂运算表达式 (a + b * c) - (d - e / f)

\`\`\`json
{
  "比例": "5%",
  "计算因子": {
    "运算符": "SUB",
    "操作数": [
      {
        "运算符": "ADD",
        "操作数": ["a", {
          "运算符": "MUL",
          "操作数": ["b", "c"]
        }]
      },
      {
        "运算符": "SUB",
        "操作数": ["d", {
          "运算符": "DIV",
          "操作数": ["e", "f"]
        }]
      }
    ]
  },
  "最小值": "0",
  "最大值": "1000"
}
\`\`\`

**示例说明**：
- 该示例计算 (a + b * c) - (d - e / f) 的结果，然后乘以 5% 的比例
- 第一层运算：b * c
- 第二层运算：a + (b * c)
- 第三层运算：e / f
- 第四层运算：d - (e / f)
- 第五层运算：(a + b * c) - (d - e / f)
- 最后应用 5% 的比例计算最终费用

**示例2**：简单场景（单因子）

\`\`\`json
{
  "比例": "8%",
  "计算因子": {
    "运算符": "NONE",
    "操作数": ["CalculatedWeight"]
  },
  "最小值": "0",
  "最大值": "5000"
}
\`\`\`

**示例2说明**：
- 该示例直接获取核重值，然后乘以 8% 的比例
- 核重 100kg：费用 = 100 × 0.08 = 8 元


### 条件型计费

计费规则：条件型计费
规则明细：
\`\`\`json
{
  "条件规则": {
    "逻辑运算符": "[逻辑运算符]",
    "条件组合": [
      {
        "逻辑运算符": "[逻辑运算符]",
        "条件组合": [
          {
            "条件": {
              "计算因子": {
                "运算符": "[运算符]",
                "操作数": ["[操作数因子]"]
              },
              "匹配规则": "[操作符]",
              "匹配值": "[匹配值]"
            }
          },
          {
            "条件": {
              "计算因子": {
                "运算符": "[运算符]",
                "操作数": [
                  "[操作数因子]",
                  {
                    "运算符": "[运算符]",
                    "操作数": ["[操作数因子]", "[操作数因子]"]
                  }
                ]
              },
              "匹配规则": "[操作符]",
              "匹配值": "[匹配值]"
            }
          }
        ]
      },
      {
        "逻辑运算符": "[逻辑运算符]",
        "条件组合": [
          {
            "条件": {
              "计算因子": {
                "运算符": "[运算符]",
                "操作数": ["[操作数因子]"]
              },
              "匹配规则": "[操作符]",
              "匹配值": "[匹配值]"
            }
          }
        ]
      }
    ]
  },
  "命中规则": {
    "计费规则": "比例型计费",
    "规则明细": [
      {
        "比例": "[比例]",
        "计算因子": {
          "运算符": "[运算符]",
          "操作数": ["[操作数因子]"]
        },
        "最小值": "[最小值]",
        "最大值": "[最大值]"
      }
    ]
  },
  "未命中规则": {
    "计费规则": "阶梯计费-分段计费",
    "规则明细": [
      {
        "区间因子": "[区间因子]",
        "区间": "(开始值, 结束值]",
        "计费因子": "[计费因子]",
        "区间价格": "[金额]",
        "最小值": "[最小值]",
        "最大值": "[最大值]"
      },
      {
        "区间因子": "[区间因子]",
        "区间": "(开始值, 结束值]",
        "计费因子": "[计费因子]",
        "区间价格": "[金额]",
        "最小值": "[最小值]",
        "最大值": "[最大值]"
      }
    ]
  }
}
\`\`\`

**校验规则**：
- 条件规则校验：
  - 必须包含"逻辑运算符"和"条件组合"两个字段
  - 逻辑运算符必须是AND、OR之一
  - 条件组合必须是数组形式，且至少包含一个条件
  - 每个条件必须包含计算因子、匹配规则和匹配值
- 计算因子校验：
  - 运算符必须是有效的算术运算符（ADD、SUB、MUL、DIV、NONE）
  - 操作数可以是因子编码、常量数值或嵌套的计算因子结构
  - 操作数中的因子编码必须是计费引擎中已维护的因子
- 匹配规则校验：
  - 匹配规则必须是有效的操作符（$Equal$、$NotEqual$、$GreaterThan$、$LessThan$、$GreaterOrEqual$、$LessOrEqual$、$AnyContain$、$AllContain$）
  - 匹配值必须与计算因子的返回类型相匹配
- 命中规则和未命中规则校验：
  - 必须包含"计费规则"和"规则明细"两个字段
  - 计费规则必须是系统支持的规则类型（如"比例型计费"、"阶梯计费-分段计费"等）
  - 规则明细必须符合对应计费规则的结构要求
- 其他校验：
  - 条件组合支持嵌套，嵌套层级不建议超过3层
  - 命中规则和未命中规则可以分别使用不同类型的计费规则

**计算逻辑**：
1. 条件计算：
   - 遍历所有条件，根据条件中的"计算因子"计算因子的值
   - 若计算因子包含运算符（如ADD、SUB、MUL、DIV），则对操作数进行相应运算
   - 若计算因子只包含单个因子编码，则直接获取该因子的值
   - 将计算结果与"匹配值"进行对比，根据"匹配规则"判断条件是否满足

2. 条件规则计算：
   - 根据"条件规则"中的"逻辑运算符"和"条件组合"递归计算最终结果
   - AND：所有条件都满足才返回true
   - OR：任意一个条件满足就返回true
   - NOT：对条件结果取反

3. 规则执行：
   - 若条件规则计算结果为true，则执行"命中规则"
   - 若条件规则计算结果为false，则执行"未命中规则"
   - 根据规则中的"计费规则"类型，调用对应的计费逻辑进行费用计算

**未命中规则说明**：
- 未命中规则为可选配置
- 如果未配置未命中规则，条件不满足时返回null
- 如果配置了未命中规则，条件不满足时执行未命中规则中的计费逻辑

**运算符说明**

| 运算符 | 含义 | 适用类型 | 示例 |
|--------|------|----------|------|
| NONE | 无运算 | 所有类型 | 当计算因子仅引用单个因子编码或常量，无需运算时使用。操作数仅包含一个元素。例如：\`NONE(Length)\` 直接获取Length因子值，\`NONE(105)\` 直接获取常量105 |
| ADD | 加法 | 数值类型 | 例如：\`ADD(Length, Width, Height)\` 计算长宽高之和 |
| SUB | 减法 | 数值类型 | 例如：\`SUB(TotalWeight, TareWeight)\` 计算净重 |
| MUL | 乘法 | 数值类型 | 例如：\`MUL(Length, Width, Height)\` 计算体积 |
| DIV | 除法 | 数值类型 | 例如：\`DIV(Length * Width * Height, 6000)\` 计算体积重量 |

**操作符说明**

| 操作符 | 含义 | 适用类型 | 示例 |
|--------|------|----------|------|
| $AnyContain$ | 数组中任意一个元素包含指定值 | 数组类型 | 例如：\`SkuDeclareNameCnArr $AnyContain$ "空调"\` 表示商品名称数组中只要有一个名称包含"空调"，就满足条件 |
| $AllContain$ | 数组中所有元素都包含指定值 | 数组类型 | 例如：\`SkuDeclareNameCnArr $AllContain$ "电器"\` 表示商品名称数组中所有名称都必须包含"电器"，才满足条件 |
| $Equal$ | 完全等于指定值 | 所有类型 | 例如：\`CustomerLevel $Equal$ "VIP"\` 表示客户等级必须完全等于"VIP"，才满足条件 |
| $NotEqual$ | 不等于指定值 | 所有类型 | 例如：\`CustomerLevel $NotEqual$ "普通"\` 表示客户等级不等于"普通"，就满足条件 |
| $GreaterThan$ | 大于指定值 | 数值类型 | 例如：\`FeeWeight $GreaterThan$ 20\` 表示计费重量大于20kg，就满足条件 |
| $LessThan$ | 小于指定值 | 数值类型 | 例如：\`FeeWeight $LessThan$ 10\` 表示计费重量小于10kg，就满足条件 |
| $GreaterOrEqual$ | 大于等于指定值 | 数值类型 | 例如：\`FeeWeight $GreaterOrEqual$ 22\` 表示计费重量大于等于22kg，就满足条件 |
| $LessOrEqual$ | 小于等于指定值 | 数值类型 | 例如：\`FeeWeight $LessOrEqual$ 50\` 表示计费重量小于等于50kg，就满足条件 |

**支持的逻辑运算符**

            'billing-element-definition': `# 计费要素标准定义

## 一、通用要素

### 1. 基础操作要素

#### 1.1 定义
基础操作要素是计费计算的基础操作符号，用于处理简单的操作需求。

#### 1.2 类型

| 操作符 | 含义 | 适用类型 | 说明 |
|--------|------|----------|------|
| NONE | 无操作 | 所有类型 | 直接使用原始值，无需任何运算。适用于单因子场景、跳过区间判断、跳过条件检查等通用场景 |

#### 1.3 示例
**NONE 操作符**
\`\`\`json
{
  "运算符": "NONE",
  "操作数": ["Length"]
}
\`\`\`
**说明**：直接获取Length因子的值，无需任何运算，适用于单因子场景。

### 1.4 应用场景与限制
**阶梯计费-分段计费/累进计费**
- **区间因子使用NONE**：
  - 含义：不需要区间判断，直接使用固定单价
  - 限制：系统应跳过区间判断逻辑，不应显示或允许配置多个区间，仅使用单一固定单价
- **计费因子使用NONE**：
  - 含义：直接使用原始因子值，不进行额外计算
  - 限制：无特殊限制，可与其他配置正常配合

**比例型计费**
- **计算因子使用NONE**：
  - 含义：直接使用原始因子值作为计算基础
  - 限制：比例值必须配置为固定值
- **比例因子使用NONE**：
  - 含义：使用固定比例，不基于其他因子动态计算
  - 限制：比例值必须为常量数值

**条件型计费**
- **条件因子使用NONE**：
  - 含义：不需要条件判断，直接应用计费规则
  - 限制：系统应跳过条件判断逻辑，不应显示或允许配置条件组合
- **计算因子使用NONE**：
  - 含义：直接使用原始因子值，不进行额外计算
  - 限制：无特殊限制，可与其他配置正常配合

**实报实销**
- 无

**通用规则与限制**
- **适用场景**：任何需要直接使用原始值而不需要额外运算的场景，任何需要跳过特定判断逻辑（如区间判断、条件检查）的场景
- **操作数限制**：NONE的操作数只能包含一个元素（单个因子或常量）
- **系统行为**：当使用NONE时，相关的计算或判断逻辑应被跳过
- **配置验证**：配置验证时应检查NONE使用的合理性，确保不会与其他配置冲突

### 2. 算术运算符

#### 2.1 定义
算术运算符用于执行数学运算，是计算费用时的核心操作符号。

#### 2.2 类型

| 运算符 | 含义 | 适用类型 | 说明 |
|--------|------|----------|------|
| ADD | 加法 | 数值类型 | 对多个操作数进行加法运算 |
| SUB | 减法 | 数值类型 | 对操作数进行减法运算 |
| MUL | 乘法 | 数值类型 | 对多个操作数进行乘法运算 |
| DIV | 除法 | 数值类型 | 对操作数进行除法运算 |

#### 2.3 示例
**ADD 运算符**
\`\`\`json
{
  "运算符": "ADD",
  "操作数": ["Length", "Width", "Height"]
}
\`\`\`
**说明**：计算长宽高之和，即 Length + Width + Height，适用于需要求和的场景。

**SUB 运算符**
\`\`\`json
{
  "运算符": "SUB",
  "操作数": ["TotalWeight", "TareWeight"]
}
\`\`\`
**说明**：计算净重，即 TotalWeight - TareWeight，适用于需要差值的场景。

**MUL 运算符**
\`\`\`json
{
  "运算符": "MUL",
  "操作数": ["Length", "Width", "Height"]
}
\`\`\`
**说明**：计算体积，即 Length × Width × Height，适用于需要乘积的场景。

**DIV 运算符**
\`\`\`json
{
  "运算符": "DIV",
  "操作数": [
    {
      "运算符": "MUL",
      "操作数": ["Length", "Width", "Height"]
    },
    "6000"
  ]
}
\`\`\`
**说明**：计算体积重量，即 (Length × Width × Height) ÷ 6000，适用于需要除法运算的场景。

#### 2.4 特性
- **通用性**：适用于所有需要数学计算的场景
- **嵌套支持**：可以嵌套使用，构建复杂的计算表达式
- **常量支持**：操作数中可以包含常量数值

### 3. 逻辑运算符

#### 3.1 定义
逻辑运算符用于条件判断，在条件型计费规则中用于组合多个条件。

#### 3.2 类型

| 逻辑运算符 | 含义 | 说明 |
|-----------|------|------|
| AND | 逻辑与 | 所有条件都必须满足才返回true |
| OR | 逻辑或 | 任意一个条件满足就返回true |
| NOT | 逻辑非 | 对条件结果取反 |

#### 3.3 示例
**AND 运算符**
\`\`\`json
{
  "逻辑运算符": "AND",
  "条件组合": [
    {
      "条件": {
        "计算因子": {
          "运算符": "NONE",
          "操作数": ["DestinationCountry"]
        },
        "匹配规则": "$Equal$",
        "匹配值": "美国"
      }
    },
    {
      "条件": {
        "计算因子": {
          "运算符": "NONE",
          "操作数": ["Weight"]
        },
        "匹配规则": "$GreaterThan$",
        "匹配值": "20"
      }
    }
  ]
}
\`\`\`
**说明**：目的国为美国且重量大于20kg，两个条件必须同时满足。

**OR 运算符**
\`\`\`json
{
  "逻辑运算符": "OR",
  "条件组合": [
    {
      "条件": {
        "计算因子": {
          "运算符": "NONE",
          "操作数": ["Length"]
        },
        "匹配规则": "$GreaterOrEqual$",
        "匹配值": "120"
      }
    },
    {
      "条件": {
        "计算因子": {
          "运算符": "ADD",
          "操作数": ["Length", "Width", "Height"]
        },
        "匹配规则": "$GreaterOrEqual$",
        "匹配值": "260"
      }
    }
  ]
}
\`\`\`
**说明**：长度大于等于120或长宽高之和大于等于260，任意一个条件满足即可。

**NOT 运算符**
\`\`\`json
{
  "逻辑运算符": "NOT",
  "条件组合": [
    {
      "条件": {
        "计算因子": {
          "运算符": "NONE",
          "操作数": ["CustomerLevel"]
        },
        "匹配规则": "$Equal$",
        "匹配值": "普通"
      }
    }
  ]
}
\`\`\`
**说明**：客户等级不等于普通，当客户等级不是普通时满足条件。

#### 3.4 特性
- **组合能力**：可以组合多个条件，构建复杂的逻辑关系
- **嵌套支持**：支持嵌套使用，实现多层逻辑判断
- **优先级**：NOT > AND > OR

### 4. 操作符

#### 4.1 定义
操作符用于条件判断中的比较操作，确定计算因子值与匹配值之间的关系。

#### 4.2 类型

| 操作符 | 含义 | 适用类型 | 说明 |
|--------|------|----------|------|
| $Equal$ | 完全等于指定值 | 所有类型 | 字符串或数值必须完全匹配 |
| $NotEqual$ | 不等于指定值 | 所有类型 | 字符串或数值不相等即满足 |
| $GreaterThan$ | 大于指定值 | 数值类型 | 数值大于匹配值 |
| $LessThan$ | 小于指定值 | 数值类型 | 数值小于匹配值 |
| $GreaterOrEqual$ | 大于等于指定值 | 数值类型 | 数值大于或等于匹配值 |
| $LessOrEqual$ | 小于等于指定值 | 数值类型 | 数值小于或等于匹配值 |
| $AnyContain$ | 数组中任意一个元素包含指定值 | 数组类型 | 只要有一个元素包含匹配值即满足 |
| $AllContain$ | 数组中所有元素都包含指定值 | 数组类型 | 所有元素都必须包含匹配值 |

#### 4.3 示例
**$Equal$ 操作符**
\`\`\`json
{
  "条件": {
    "计算因子": {
      "运算符": "NONE",
      "操作数": ["CustomerLevel"]
    },
    "匹配规则": "$Equal$",
    "匹配值": "VIP"
  }
}
\`\`\`
**说明**：客户等级必须完全等于"VIP"，适用于精确匹配场景。

**$NotEqual$ 操作符**
\`\`\`json
{
  "条件": {
    "计算因子": {
      "运算符": "NONE",
      "操作数": ["CustomerLevel"]
    },
    "匹配规则": "$NotEqual$",
    "匹配值": "普通"
  }
}
\`\`\`
**说明**：客户等级不等于"普通"，适用于排除特定值的场景。

**$GreaterThan$ 操作符**
\`\`\`json
{
  "条件": {
    "计算因子": {
      "运算符": "NONE",
      "操作数": ["FeeWeight"]
    },
    "匹配规则": "$GreaterThan$",
    "匹配值": "20"
  }
}
\`\`\`
**说明**：计费重量大于20kg，适用于需要数值比较的场景。

**$LessThan$ 操作符**
\`\`\`json
{
  "条件": {
    "计算因子": {
      "运算符": "NONE",
      "操作数": ["FeeWeight"]
    },
    "匹配规则": "$LessThan$",
    "匹配值": "10"
  }
}
\`\`\`
**说明**：计费重量小于10kg，适用于需要数值比较的场景。

**$GreaterOrEqual$ 操作符**
\`\`\`json
{
  "条件": {
    "计算因子": {
      "运算符": "NONE",
      "操作数": ["FeeWeight"]
    },
    "匹配规则": "$GreaterOrEqual$",
    "匹配值": "22"
  }
}
\`\`\`
**说明**：计费重量大于等于22kg，适用于需要数值比较的场景。

**$LessOrEqual$ 操作符**
\`\`\`json
{
  "条件": {
    "计算因子": {
      "运算符": "NONE",
      "操作数": ["FeeWeight"]
    },
    "匹配规则": "$LessOrEqual$",
    "匹配值": "50"
  }

**说明**：计费重量小于等于50kg，适用于需要数值比较的场景。

**$AnyContain$ 操作符**
\`\`\`json
{
  "条件": {
    "计算因子": {
      "运算符": "NONE",
      "操作数": ["SkuDeclareNameCnArr"]

    "计算因子": {

**说明**：商品名称数组中所有名称都必须包含"电器"，才满足条件，适用于数组元素全部匹配的场景。

            'billing-rule-flag': `# 关于是否计费规则整理

## 一、基本概念

**是否计费规则**：用于判断费用项是否应该被计算的规则体系，是计费引擎中费用项配置的重要组成部分。

**核心作用**：
- 控制费用项的计费开关
- 基于业务单据参数进行条件判断
- 实现灵活的计费控制逻辑

## 二、配置结构

标准配置结构：

\`\`\`json
"是否计费": {
  "默认计费": "[是/否]",
  "判断规则": {
    "因子值": "[因子编码]",
    "操作符": "[操作符]",
    "匹配值": "[匹配值]"
  }
}
\`\`\`

**字段说明**：
| 字段 | 说明 |
|------|------|
| 默认计费 | 费用项的默认计费状态 |
| 因子值 | 业务单据中的因子编码 |
| 操作符 | 操作符 |
| 匹配值 | 用于匹配的值 |

## 三、因子的定义与使用

**重要说明**：
- 因子是计费引擎中用于计算费用的基础元素，业务单据会注册到计费引擎并创建对应的因子
- 因子在引擎中的唯一标识 = 所属单据编码 + 因子编码
- **因子编码只能传基于模型关联的业务单据的因子编码**，即只能使用与当前模型关联的业务单据所对应的因子
- 上游系统传递的业务单据字段必须与引擎中注册的因子对应
- 因子的类型决定了可以使用的操作符

## 四、操作符

| 操作符 | 说明 | 适用类型 |
|--------|------|----------|
| $Equal$ | 等于 | 所有类型 |
| $NotEqual$ | 不等于 | 所有类型 |
| $GreaterThan$ | 大于 | 数值 |
| $LessThan$ | 小于 | 数值 |
| $GreaterOrEqual$ | 大于等于 | 数值 |
| $LessOrEqual$ | 小于等于 | 数值 |
| $In$ | 包含于 | 数组 |
| $NotIn$ | 不包含于 | 数组 |
| $AnyContain$ | 任一包含 | 数组 |
| $AllContain$ | 全部包含 | 数组 |
| $StartsWith$ | 开头是 | 字符串 |
| $EndsWith$ | 结尾是 | 字符串 |
`
        };

        let activeItemId = null;

        function renderNavTree(data, container) {
            data.forEach(item => {
                const navItem = document.createElement('div');
                navItem.className = 'nav-item level-' + item.level;
                navItem.dataset.id = item.id;
                navItem.textContent = item.label;

                navItem.addEventListener('click', () => {
                    handleNavItemClick(item);
                });

                container.appendChild(navItem);

                if (item.children && item.children.length > 0) {
                    const childContainer = document.createElement('div');
                    childContainer.className = 'nav-children';
                    renderNavTree(item.children, childContainer);
                    container.appendChild(childContainer);
                }
            });
        }

        function handleNavItemClick(item) {
            if (item.level === 1 || item.level === 2) {
                return;
            }

            setActiveItem(item.id);
            loadContent(item.id);
        }

        function setActiveItem(id) {
            const allItems = document.querySelectorAll('.nav-item');
            allItems.forEach(item => {
                item.classList.remove('active');
            });

            const activeItem = document.querySelector('[data-id="' + id + '"]');
            if (activeItem) {
                activeItem.classList.add('active');
            }

            activeItemId = id;
        }

        function loadContent(id) {
            const contentArea = document.getElementById('contentArea');
            const content = markdownContents[id];

            if (content && content.trim()) {
                contentArea.innerHTML = marked.parse(content);
            } else {
                contentArea.innerHTML = `
